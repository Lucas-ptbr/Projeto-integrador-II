<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA ALPHA - Quiz de Estudos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen relative">

    <nav class="border-b border-slate-800 bg-slate-900/80 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-3xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">
                <div class="bg-indigo-600 p-2 rounded-lg">
                    <i data-lucide="zap" class="text-white"></i>
                </div>
                <span class="font-extrabold text-xl tracking-tighter">SISTEMA<span class="text-indigo-500">ALPHA</span></span>
            </a>
            <a href="index.html" class="text-slate-400 hover:text-indigo-400 transition-colors flex items-center gap-2 text-sm font-bold">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Voltar
            </a>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto px-6 py-10">
        <div class="mb-8">
            <h1 class="text-3xl font-black flex items-center gap-3">
                <i data-lucide="book-open" class="text-emerald-500"></i>
                Quiz de Estudos
            </h1>
            <p class="text-slate-400 mt-2">Responda às perguntas e ganhe XP de acordo com seus acertos.</p>
        </div>

        <div class="flex justify-between items-center mb-3 text-sm font-bold">
            <span id="progress-label" class="text-slate-400">Pergunta 1</span>
            <span id="score-label" class="text-emerald-400">0 acertos</span>
        </div>
        <div class="w-full bg-slate-800 h-3 rounded-full overflow-hidden p-0.5 mb-8">
            <div id="quiz-bar" class="bg-gradient-to-r from-indigo-600 to-emerald-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div id="quiz-card" class="bg-slate-900 border-2 border-slate-800 rounded-3xl p-8">
            <h2 id="question-text" class="text-xl font-bold mb-6"></h2>
            <div id="options" class="space-y-3"></div>
            <div class="mt-8 flex justify-end">
                <button id="next-btn" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition-colors flex items-center gap-2">
                    Próxima <i data-lucide="arrow-right" class="w-4 h-4"></i>
                </button>
            </div>
        </div>

        <div id="result-card" class="hidden bg-slate-900 border-2 border-emerald-500/40 rounded-3xl p-8 text-center">
            <div class="bg-emerald-500/10 w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4">
                <i data-lucide="trophy" class="text-emerald-400 w-10 h-10"></i>
            </div>
            <h2 class="text-3xl font-black mb-2">Quiz Concluído!</h2>
            <p class="text-slate-400 mb-6">Você acertou <span id="final-score" class="text-emerald-400 font-bold"></span>.</p>
            <p class="text-lg font-bold text-indigo-300 mb-8">+<span id="xp-earned"></span> XP conquistados</p>
            <div class="flex flex-col sm:flex-row gap-3 justify-center">
                <a href="index.html" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3 px-6 rounded-xl transition-colors">
                    Voltar ao Dashboard
                </a>
                <button onclick="window.location.reload()" class="bg-transparent border border-slate-700 hover:bg-slate-800 text-slate-300 font-bold py-3 px-6 rounded-xl transition-colors">
                    Refazer Quiz
                </button>
            </div>
        </div>
    </main>

    <footer class="w-full text-center py-6 border-t border-slate-900 text-slate-600 text-xs font-semibold">
        Desenvolvido integralmente por Igor Metring e Julia Horing
    </footer>

    <script src="quiz.js"></script>
</body>
</html>
